{% extends "catalogo/base.html" %}
{% block title %}{{ accion }} Autor{% endblock %}
{% block topbar_title %}✍️ {{ accion }} Autor{% endblock %}
{% block content %}
<div class="page-header">
  <div>
    <a href="{% url 'lista_autores' %}" style="font-size:0.82rem;color:#8a7d72;text-decoration:none">← Volver a autores</a>
    <h1 class="page-title" style="margin-top:6px">{{ accion }} autor</h1>
  </div>
</div>
<div class="card" style="max-width:600px">
  <div class="card-body">
    <form method="post">{% csrf_token %}
      <div class="form-grid">
        <div class="form-group">
          <label>Nombre *</label>
          <input type="text" name="nombre" value="{{ autor.nombre|default:'' }}" required>
        </div>
        <div class="form-group">
          <label>Apellido *</label>
          <input type="text" name="apellido" value="{{ autor.apellido|default:'' }}" required>
        </div>
        <div class="form-group">
          <label>Fecha de nacimiento</label>
          <input type="date" name="fecha_nacimiento" value="{{ autor.fecha_nacimiento|default:'' }}">
        </div>
        <div class="form-group">
          <label>Nacionalidad</label>
          <input type="text" name="nacionalidad" value="{{ autor.nacionalidad|default:'' }}" placeholder="Mexicana, Española…">
        </div>
        <div class="form-group full">
          <label>Biografía</label>
          <textarea name="biografia">{{ autor.biografia|default:'' }}</textarea>
        </div>
      </div>
      <div class="form-actions" style="margin-top:20px">
        <button type="submit" class="btn btn-amber">{% if autor %}💾 Guardar{% else %}➕ Agregar{% endif %}</button>
        <a href="{% url 'lista_autores' %}" class="btn btn-outline">Cancelar</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
