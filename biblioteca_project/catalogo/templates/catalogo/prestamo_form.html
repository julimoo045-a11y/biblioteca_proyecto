{% extends "catalogo/base.html" %}
{% block title %}Nuevo Préstamo{% endblock %}
{% block topbar_title %}📤 Nuevo Préstamo{% endblock %}
{% block content %}
<div class="page-header">
  <div>
    <a href="{% url 'lista_prestamos' %}" style="font-size:0.82rem;color:#8a7d72;text-decoration:none">← Volver a préstamos</a>
    <h1 class="page-title" style="margin-top:6px">Registrar préstamo</h1>
  </div>
</div>
<div class="card" style="max-width:600px">
  <div class="card-body">
    <form method="post">{% csrf_token %}
      <div class="form-grid">
        <div class="form-group full">
          <label>Libro * <span class="text-muted">(solo disponibles)</span></label>
          <select name="libro" required>
            <option value="">— Seleccionar libro —</option>
            {% for l in libros %}<option value="{{ l.pk }}">{{ l.titulo }} ({{ l.cantidad_disponible }} disp.)</option>{% endfor %}
          </select>
        </div>
        <div class="form-group full">
          <label>Miembro *</label>
          <select name="miembro" required>
            <option value="">— Seleccionar miembro —</option>
            {% for m in miembros %}<option value="{{ m.pk }}">{{ m }} — {{ m.email }}</option>{% endfor %}
          </select>
        </div>
        <div class="form-group">
          <label>Días de préstamo</label>
          <input type="number" name="dias_prestamo" value="14" min="1" max="90">
        </div>
        <div class="form-group full">
          <label>Notas</label>
          <textarea name="notas" placeholder="Observaciones opcionales…"></textarea>
        </div>
      </div>
      <div class="form-actions" style="margin-top:20px">
        <button type="submit" class="btn btn-amber">📤 Registrar préstamo</button>
        <a href="{% url 'lista_prestamos' %}" class="btn btn-outline">Cancelar</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
